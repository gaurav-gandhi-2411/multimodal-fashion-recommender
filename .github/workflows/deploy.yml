# deploy.yml — Manual-only Cloud Run deployment workflow.
#
# TRIGGER: workflow_dispatch only. This workflow never runs automatically on push or PR.
#
# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED GITHUB SECRETS  (Settings → Secrets and variables → Actions → Secrets)
# ──────────────────────────────────────────────────────────────────────────────
#   GCS_PROJECT           — GCP project ID. NEVER aetherart-497918. May be a shared
#                           project ONLY if every resource below is name-isolated.
#   GCS_BUCKET_NAME       — NEW, dedicated GCS bucket for this product's brand assets
#                           (do not reuse a bucket owned by another product)
#   GCP_WIF_PROVIDER      — Workload Identity Federation provider resource name,
#                           e.g. projects/123456/locations/global/workloadIdentityPools/fashion-rec-pool/providers/fashion-rec-provider
#   GCP_SERVICE_ACCOUNT   — DEDICATED SA email for this service (NOT another product's SA).
#                           Least-privilege: artifactregistry.writer on the fashion-rec repo,
#                           run.developer, serviceAccountUser on itself, storage.objectViewer on
#                           the new bucket, secretmanager.secretAccessor on the 4 secrets below.
#
# Secret Manager secret names (referenced in --set-secrets; namespaced so they cannot collide
# in a shared project — the Cloud Run ENV VAR names stay SNITCH_API_KEY etc. for the app):
#   fashion-rec-snitch-key, fashion-rec-fashor-key, fashion-rec-powerlook-key, fashion-rec-groq-key
#
# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED GITHUB VARIABLES  (Settings → Secrets and variables → Actions → Variables)
# ──────────────────────────────────────────────────────────────────────────────
#   GCP_REGION            — GCP region, e.g. us-central1
#   GAR_HOSTNAME          — Artifact Registry hostname, e.g. us-central1-docker.pkg.dev
#   GAR_REPO              — Artifact Registry repository name, e.g. fashion-rec
#
# ──────────────────────────────────────────────────────────────────────────────
# NOTES
# ──────────────────────────────────────────────────────────────────────────────
# • REDIS_URL is intentionally omitted from Cloud Run env vars. The API falls back
#   to an in-process LRU cache when Redis is unavailable. To enable managed caching,
#   provision a Memorystore instance and add REDIS_URL to --set-secrets below.
#
# • --allow-unauthenticated makes the endpoint publicly accessible. To restrict
#   access, replace with --no-allow-unauthenticated and grant the Cloud Run Invoker
#   role (roles/run.invoker) to the specific service accounts or groups that need it.

name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

# Never cancel an in-flight deploy; a partial deploy is worse than a queued one.
concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    env:
      IMAGE: ${{ vars.GAR_HOSTNAME }}/${{ secrets.GCS_PROJECT }}/${{ vars.GAR_REPO }}/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF — no SA key file)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GAR_HOSTNAME }} --quiet

      - name: Build CPU-only image
        run: |
          docker build \
            --no-cache \
            -f infra/Dockerfile.cpu \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fashion-recommender-staging \
            --image "$IMAGE:${{ github.sha }}" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --port 8000 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 4Gi \
            --cpu 1 \
            --timeout 60s \
            --concurrency 80 \
            --set-env-vars "^##^LOG_FORMAT=json##GCS_PROJECT=${{ secrets.GCS_PROJECT }}##GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}##USD_TO_INR=83.0##BRANDS_ENABLED=snitch,fashor,powerlook" \
            --set-secrets "SNITCH_API_KEY=fashion-rec-snitch-key:latest,FASHOR_API_KEY=fashion-rec-fashor-key:latest,POWERLOOK_API_KEY=fashion-rec-powerlook-key:latest,GROQ_API_KEY=fashion-rec-groq-key:latest" \
            --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --allow-unauthenticated \
            --project "${{ secrets.GCS_PROJECT }}"

      - name: Route 100% traffic to new revision
        run: |
          gcloud run services update-traffic fashion-recommender-staging \
            --to-latest \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ secrets.GCS_PROJECT }}"

      - name: Show Cloud Run URL
        run: |
          gcloud run services describe fashion-recommender-staging \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ secrets.GCS_PROJECT }}" \
            --format "value(status.url)"
