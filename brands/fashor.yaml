brand: fashor
display_name: Fashor
catalog_path: data/fashor/items.parquet
index_path: indices/fashor/active.faiss
embeddings_path: indices/fashor/item_emb.npy
visual_index_path: indices/fashor/visual.faiss
color_index_path: data/fashor/colors.json
visual_search_min_score: 0.55
pdp_url_template: null
api_key_env: FASHOR_API_KEY
llm:
  provider: groq
  enabled: true
transactions_dir: data/fashor/transactions
rerank:
  enabled: true
  candidate_pool_size: 50
  w_similarity: 0.70
  w_price_penalty: 0.25
  w_category_affinity: 0.15
  price_norm_inr: 1200.0
  equivalent_group_bonus: 0.70
  related_group_bonus: 0.40
  # Feature 1: MMR diversity — cuts near-twin "more like this" results.
  # Ablation (n=100): w=0.20 reduces near-twin pairs (2.46→~2.0) at no strict cost.
  w_diversity: 0.20
  dupe_sim_threshold: 0.92   # eval redundancy criterion; does NOT affect MMR selection
  # Feature 2: price-band coherence — DISABLED (w_price_band=0); redundant with the
  # continuous price penalty and cost ~1pp strict in ablation. Bands kept for the metric.
  price_bands_inr: [900, 1800, 3000]
  w_price_band: 0.0
  # Feature 3: occasion/seasonal awareness — festive vs everyday vs work is the primary
  # discriminator for Fashor (ethnic brand). "ethnic"/"traditional" are intentionally
  # excluded from the lexicon — they appear on ~60% of items and do not discriminate.
  # Tuned to the knee 0.08: occ_match 59%->94% (+35pp) for only -2pp strict (87%->85%,
  # above the 58% floor). The India differentiator — festive queries return festive items.
  w_occasion: 0.08
  parse_explicit_occasion: false
  category_groups:
    - name: ethnic_set
      members:
        - "3P Kurta Set"
        - "2P Kurta Set"
        - "Kurta Set"
        - "Co-ord Set"
      related_groups:
        - ethnic_individual
    - name: ethnic_individual
      members:
        - "Kurtas"
        - "Kurta"
        - "Kurti/Tunics"
      related_groups:
        - ethnic_set
    - name: western_dress
      members:
        - "Dresses"
        - "Dress"
# Complete-the-Look: DISABLED. Fashor's catalog is ~90% complete ethnic sets
# (3P/2P Kurta Set = top+bottom+dupatta already a full outfit); only 3 standalone
# Bottom items exist, so outfit completion would be degenerate. Re-enable with
# slots/complements if separates (bottoms, dupattas, footwear) are added later.
complete:
  enabled: false
