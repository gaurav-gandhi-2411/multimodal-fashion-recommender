brand: powerlook
display_name: Powerlook
catalog_path: data/powerlook/items.parquet
index_path: indices/powerlook/active.faiss
embeddings_path: indices/powerlook/item_emb.npy
pdp_url_template: null
api_key_env: POWERLOOK_API_KEY
llm:
  provider: template
  enabled: true
transactions_dir: data/powerlook/transactions
rerank:
  enabled: true
  candidate_pool_size: 50
  w_similarity: 0.70
  w_price_penalty: 0.10
  w_category_affinity: 0.15
  price_norm_inr: 400.0
  equivalent_group_bonus: 0.70
  related_group_bonus: 0.40
  # Feature 1: MMR diversity — cuts near-twin "more like this" results.
  # Ablation (n=100): w=0.20 reduces near-twin pairs (0.34→0.22) at no strict cost.
  w_diversity: 0.20
  dupe_sim_threshold: 0.92   # eval redundancy criterion; does NOT affect MMR selection
  # Feature 2: price-band coherence — DISABLED (w_price_band=0); redundant with the
  # continuous price penalty and cost ~1pp strict in ablation. Bands kept for the metric.
  price_bands_inr: [600, 1000, 1400]
  w_price_band: 0.0
  # Feature 3: occasion/seasonal awareness at 0.08 — occ_match 34%->78% with NO strict cost
  # (slight price loosening). Keyword lexicon only; ethnic/traditional excluded (non-discriminating).
  w_occasion: 0.08
  parse_explicit_occasion: false
  category_groups: []
# Complete-the-Look (outfit completion): menswear separates → strong fit.
# Co-ord (complete set) is intentionally left unslotted so co-ord queries return empty.
complete:
  enabled: true
  per_slot: 2
  max_items: 6
  w_style: 0.7
  w_price: 0.3
  price_norm_inr: 400.0
  slots:
  - name: TOP
    categories: [Shirt, T-Shirt, Vest]
  - name: BOTTOM
    categories: [Bottom]
  - name: LAYER
    categories: [Jacket, Track-Suit]
  - name: ACCESSORY
    categories: [Belts, Accessories]
  complements:
    TOP: [BOTTOM, LAYER, ACCESSORY]
    BOTTOM: [TOP, LAYER]
    LAYER: [TOP, BOTTOM]
