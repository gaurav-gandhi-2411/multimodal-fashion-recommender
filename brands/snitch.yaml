brand: snitch
display_name: Snitch
catalog_path: data/snitch/items.parquet
index_path: indices/snitch/active.faiss
embeddings_path: indices/snitch/item_emb.npy
pdp_url_template: null
api_key_env: SNITCH_API_KEY
llm:
  provider: template
  enabled: true
rerank:
  enabled: true
  candidate_pool_size: 100
  w_similarity: 0.7
  w_price_penalty: 0.15
  w_category_affinity: 0.15
  price_norm_inr: 500.0
  equivalent_group_bonus: 0.7
  related_group_bonus: 0.4
  category_groups:
  - name: bottoms
    members:
    - Trousers
    - Jeans
    - Cargo Pants
# Complete-the-Look (outfit completion): menswear separates → strong fit.
# Query a TOP → returns coordinated BOTTOM + LAYER items (visual+price heuristic).
complete:
  enabled: true
  per_slot: 2
  max_items: 6
  w_style: 0.7
  w_price: 0.3
  price_norm_inr: 500.0
  slots:
  - name: TOP
    categories: [Shirts, T-Shirts]
  - name: BOTTOM
    categories: [Jeans, Trousers, Cargo Pants, Shorts]
  - name: LAYER
    categories: [Jackets, Overshirt, Sweaters, Hoodies]
  complements:
    TOP: [BOTTOM, LAYER]
    BOTTOM: [TOP, LAYER]
    LAYER: [TOP, BOTTOM]
