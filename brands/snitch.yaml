brand: snitch
display_name: Snitch
catalog_path: data/snitch/items.parquet
index_path: indices/snitch/active.faiss
embeddings_path: indices/snitch/item_emb.npy
pdp_url_template: null
api_key_env: SNITCH_API_KEY
llm:
  provider: template
  enabled: true
transactions_dir: data/snitch/transactions
rerank:
  enabled: true
  candidate_pool_size: 50
  w_similarity: 0.70
  w_price_penalty: 0.15
  w_category_affinity: 0.15
  price_norm_inr: 500.0
  equivalent_group_bonus: 0.70
  related_group_bonus: 0.40
  category_groups:
    - name: bottoms
      members:
        - "Trousers"
        - "Jeans"
        - "Cargo Pants"
