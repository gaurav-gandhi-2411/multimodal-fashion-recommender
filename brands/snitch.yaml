brand: snitch
display_name: Snitch
catalog_path: data/snitch/items.parquet
index_path: indices/snitch/active.faiss
embeddings_path: indices/snitch/item_emb.npy
visual_index_path: indices/snitch/visual.faiss
pdp_url_template: null
api_key_env: SNITCH_API_KEY
llm:
  provider: groq
  enabled: true
rerank:
  enabled: true
  candidate_pool_size: 100
  w_similarity: 0.7
  w_price_penalty: 0.15
  w_category_affinity: 0.15
  price_norm_inr: 500.0
  equivalent_group_bonus: 0.7
  related_group_bonus: 0.4
  # Feature 1: MMR diversity — cuts near-twin "more like this" results.
  # Ablation (n=100): w=0.20 reduces near-twin pairs with ZERO strict cat-match cost.
  w_diversity: 0.20
  dupe_sim_threshold: 0.92   # eval redundancy criterion; does NOT affect MMR selection
  # Feature 2: price-band coherence — DISABLED (w_price_band=0).
  # Ablation showed the discrete band bonus is redundant with the continuous price
  # penalty above and cost ~1pp strict for a cosmetic same-band-rate gain. Bands kept
  # so the eval still reports same_band_rate; re-enable only if a brand needs it.
  price_bands_inr: [600, 1200, 2000]
  w_price_band: 0.0
  # Feature 3: occasion/seasonal awareness — DISABLED (w_occasion=0). Ablation showed it's a
  # near-no-op on Snitch: ~93% of items already tag "casual", so occasion_match is already 93%
  # before any boost (only +7pp headroom) and it slightly worsened price coherence. parse_explicit
  # left on so re-enabling is one weight change. (ethnic/traditional excluded — non-discriminating.)
  w_occasion: 0.0
  parse_explicit_occasion: true
  category_groups:
  - name: bottoms
    members:
    - Trousers
    - Jeans
    - Cargo Pants
# Complete-the-Look (outfit completion): menswear separates → strong fit.
# Query a TOP → returns coordinated BOTTOM + LAYER items (visual+price heuristic).
complete:
  enabled: true
  per_slot: 2
  max_items: 6
  w_style: 0.7
  w_price: 0.3
  price_norm_inr: 500.0
  slots:
  - name: TOP
    categories: [Shirts, T-Shirts]
  - name: BOTTOM
    categories: [Jeans, Trousers, Cargo Pants, Shorts]
  - name: LAYER
    categories: [Jackets, Overshirt, Sweaters, Hoodies]
  complements:
    TOP: [BOTTOM, LAYER]
    BOTTOM: [TOP, LAYER]
    LAYER: [TOP, BOTTOM]
